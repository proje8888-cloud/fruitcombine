<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fruit Combine</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
        }
        
        .game-screen {
            width: 100%;
            max-width: 400px;
            height: 100vh;
            max-height: 800px;
            background: #1a1a2e;
            border-radius: 30px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
        }
        
        .background-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://i.postimg.cc/T2Whx8cb/Fruit-Conbine.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 0;
        }
        
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.3);
            z-index: 1;
        }
        
        .content {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            padding-bottom: 120px;
            z-index: 2;
        }
        
        .play-btn {
            padding: 16px 50px;
            font-size: 28px;
            font-weight: bold;
            background: linear-gradient(45deg, #FF6B6B, #FF8E53);
            color: white;
            border: none;
            border-radius: 50px;
            box-shadow: 0 8px 0 #C94F4F;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            width: 220px;
            transition: all 0.1s;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .play-btn:active {
            transform: translateY(5px);
            box-shadow: 0 3px 0 #C94F4F;
        }
        
        [dir="rtl"] .play-btn {
            letter-spacing: 0;
        }
    </style>
</head>
<body>
    <div class="game-screen">
        <div class="background-image"></div>
        <div class="overlay"></div>
        <div class="content">
            <button class="play-btn" onclick="startGame()" id="playButton"><span id="playBtnText">OYNA</span></button>
        </div>
    </div>
    
    <script src="js/translations.js"></script>
    <script>
        // Buton metnini güncelleme fonksiyonu
        function updateButtonText() {
            var btnSpan = document.getElementById('playBtnText');
            if (btnSpan) {
                // translations.js yüklendiyse ve t fonksiyonu varsa
                if (typeof t !== 'undefined') {
                    var translatedText = t('play');
                    if (translatedText && translatedText !== 'play') {
                        btnSpan.innerHTML = translatedText;
                        console.log('✅ Buton güncellendi: ' + translatedText);
                        return;
                    }
                }
                // Eğer translations.js yüklenmemişse veya t('play') çalışmazsa
                console.log('⚠️ translations.js yüklenmedi, varsayılan dil kullanılıyor');
            }
        }
        
        // Oyunu başlat
        function startGame() {
            window.location.href = 'game.html';
        }
        
        // RTL ayarı (Arapça için) - translations.js yüklenene kadar bekle
        function applyRTL() {
            if (typeof getSystemLanguage !== 'undefined') {
                var currentLang = localStorage.getItem('language') || getSystemLanguage();
                if (currentLang === 'ar') {
                    document.documentElement.setAttribute('dir', 'rtl');
                } else {
                    document.documentElement.setAttribute('dir', 'ltr');
                }
            } else {
                setTimeout(applyRTL, 50);
            }
        }
        
        // Sayfa yüklendiğinde buton metnini güncelle
        document.addEventListener('DOMContentLoaded', function() {
            // Hemen dene
            updateButtonText();
            // Biraz bekle tekrar dene (translations.js geç yüklenirse)
            setTimeout(updateButtonText, 100);
            setTimeout(updateButtonText, 300);
            setTimeout(updateButtonText, 500);
            // RTL ayarını yap
            applyRTL();
        });
    </script>
</body>  
</html>
